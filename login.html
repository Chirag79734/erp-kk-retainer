<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KK ERP</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            background-image: 
                linear-gradient(rgba(11, 15, 25, 0.75), rgba(11, 15, 25, 0.95)),
                url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: white;
            margin: 0 auto 24px auto;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.25);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background-color: white;
            color: #1f2937;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }
        
        .loading {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }
        
        #error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card" style="padding: 0; overflow: hidden; max-width: 480px; width: 90%;">
        <div style="padding: 48px 48px 32px 48px;">
            <img src="./assets/logo.png" alt="Performics Logo" style="max-height: 100px; margin: 0 auto 24px auto; display: block;">
            
            <h1 style="font-size: 26px; font-weight: 700; margin-bottom: 12px; font-family: 'Inter', sans-serif;">Access Your Business Dashboard</h1>
            <p style="font-size: 15px; color: var(--text-secondary); margin-bottom: 24px;">Enter your work email address and we'll<br>send you a secure login link.</p>
            
            <div style="width: 32px; height: 2px; background-color: var(--primary); margin: 0 auto 32px auto; border-radius: 2px;"></div>
            
            <div class="input-group" style="margin-bottom: 24px; text-align: left;">
                <label for="email-input" style="display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">
                    <i data-lucide="mail" style="width: 16px; height: 16px;"></i> Work Email Address
                </label>
                <input type="email" id="email-input" placeholder="name@company.com" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; outline: none; box-sizing: border-box; font-family: 'Inter', sans-serif; color: #000;">
            </div>

            <button class="google-btn" id="login-btn" style="background: var(--primary); color: white; justify-content: center; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); border-radius: 8px; font-size: 15px; padding: 14px;">
                <i data-lucide="send" style="width: 18px; height: 18px;"></i> Send Login Link
            </button>
            <div id="success-message" style="color: var(--success); font-size: 13px; margin-top: 16px; display: none;">Link sent! Check your email inbox.</div>
            <div id="error-message">Failed to sign in. Please try again.</div>
        </div>
        
        <!-- Bottom Help Box -->
        <div style="background-color: #f8fafc; color: #0f111a; padding: 24px 32px; text-align: left; display: flex; align-items: center; gap: 16px;">
            <div style="background-color: #e0e7ff; color: var(--primary); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <i data-lucide="help-circle" style="width: 20px; height: 20px;"></i>
            </div>
            <div>
                <div style="font-weight: 700; font-size: 14px; margin-bottom: 4px;">Need help accessing the dashboard?</div>
                <div style="font-size: 14px; color: #475569;">Please contact <span style="color: var(--primary); font-weight: 600;">David Konghay</span>.</div>
            </div>
        </div>
    </div>

    <!-- Auth Module -->
    <script type="module">
        import { auth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut, db, doc, getDoc } from './auth.js';

        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const emailInput = document.getElementById('email-input');

        // Check URL for errors from previously logged out states
        const urlParams = new URLSearchParams(window.location.search);
        const errorParam = urlParams.get('error');
        if (errorParam === 'permission_denied' || errorParam === 'notfound') {
            errorMsg.textContent = "Access Denied. You are not authorized by the organization.";
            errorMsg.style.display = 'block';
            signOut(auth).catch(console.error);
        }

        // STEP 1: Handle Email Link arriving from Inbox
        if (isSignInWithEmailLink(auth, window.location.href)) {
            // Get the email if available.
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                // User opened the link on a different device. To prevent session fixation attacks, ask for it.
                email = window.prompt('Please provide your email for confirmation');
            }
            
            if (email) {
                loginBtn.classList.add('loading');
                loginBtn.innerHTML = 'Verifying...';
                
                signInWithEmailLink(auth, email, window.location.href)
                    .then(async (result) => {
                        window.localStorage.removeItem('emailForSignIn');
                        // Optional: Re-verify just in case
                        const userDocRef = doc(db, 'users', result.user.email);
                        const userDocSnap = await getDoc(userDocRef);
                        if (userDocSnap.exists()) {
                            window.location.href = 'index.html';
                        } else {
                            await signOut(auth);
                            throw new Error("Access Denied. Email not authorized.");
                        }
                    })
                    .catch((error) => {
                        console.error("Link Error:", error);
                        errorMsg.textContent = error.message || "Failed to sign in with this link.";
                        errorMsg.style.display = 'block';
                        loginBtn.classList.remove('loading');
                        loginBtn.innerHTML = 'Send Login Link';
                    });
            }
        } else {
            // STEP 2: Standard check if already logged in
            onAuthStateChanged(auth, (user) => {
                if (user && !errorParam) {
                    window.location.href = 'index.html';
                }
            });
        }

        // STEP 3: Handle sending the magic link
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim().toLowerCase();
            if (!email) {
                errorMsg.textContent = "Please enter your email address.";
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.innerHTML = 'Checking...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // If authorized, send the link
                const actionCodeSettings = {
                    // URL you want to redirect back to. The domain must be whitelisted.
                    url: 'https://chirag79734.github.io/erp-kk-retainer/login.html',
                    handleCodeInApp: true
                };

                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                
                // Save the email locally so you don't need to ask for it again
                window.localStorage.setItem('emailForSignIn', email);
                
                successMsg.style.display = 'block';
                loginBtn.classList.remove('loading');
                loginBtn.innerHTML = 'Send Login Link';
                emailInput.value = ''; // clear

            } catch (error) {
                console.error("Login error:", error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                loginBtn.classList.remove('loading');
                loginBtn.innerHTML = 'Send Login Link';
            }
        });

        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
