<!DOCTYPE html>
<html>
<head>
    <title>Migrate Clients</title>
</head>
<body>
    <h1>Migrating Clients to Firestore...</h1>
    <div id="status">Please wait...</div>
    
    <script src="oldMockData.js"></script>
    
    <script type="module">
        import { db, doc, setDoc } from './auth.js';
        
        async function runMigration() {
            try {
                const clients = initialClients;
                if (!clients || clients.length === 0) {
                    document.getElementById('status').innerText = "No clients found to migrate.";
                    return;
                }
                
                let count = 0;
                for (const c of clients) {
                    const clientRef = doc(db, 'clients', c.id);
                    await setDoc(clientRef, c);
                    document.getElementById('status').innerHTML += `<br>Migrated: ${c.name}`;
                    count++;
                }
                
                document.getElementById('status').innerHTML += `<br><b>Migration Complete! ${count} clients migrated. You can now close this tab and refresh the dashboard.</b>`;
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML += `<br><span style="color:red">Error: ${error.message}</span>`;
            }
        }
        
        runMigration();
    </script>
</body>
</html>
